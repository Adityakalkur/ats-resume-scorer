[server]
# Hard cap on uploaded file size (MB). Matches security.py MAX_RESUME_MB.
maxUploadSize = 10
# Required for cloud / headless deployments (no local browser)
headless = true
# Let Streamlit Cloud handle CORS — avoids mobile preflight failures
enableCORS = false
# Disable WebSocket compression — improves stability on mobile networks
enableWebsocketCompression = false

[browser]
# Disable usage statistics reporting
gatherUsageStats = false

[runner]
# Faster re-runs when files change
fastReruns = true

[theme]
base = "dark"
primaryColor = "#6C63FF"
backgroundColor = "#0F0F14"
secondaryBackgroundColor = "#16161E"
textColor = "#E8E8F0"
font = "sans serif"
